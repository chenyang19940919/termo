<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2233"/>
      <stop offset="55%" stop-color="#12141f"/>
      <stop offset="100%" stop-color="#0a0b12"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="prompt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- subtle top-light sheen -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#sheen)"/>

  <!-- faint border -->
  <rect x="6" y="6" width="1012" height="1012" rx="220" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="4"/>

  <!-- window control dots -->
  <circle cx="176" cy="196" r="17" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="232" cy="196" r="17" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="288" cy="196" r="17" fill="#ffffff" fill-opacity="0.18"/>

  <!-- prompt chevron + cursor -->
  <g filter="url(#glow)">
    <polyline points="298,368 486,512 298,656"
              fill="none" stroke="url(#prompt)"
              stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="556" y="470" width="230" height="76" rx="18" fill="url(#prompt)"/>
  </g>
</svg>
