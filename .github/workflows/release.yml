name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Termo ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

      # Electron 版安裝檔：與 Tauri 版附在同一個 release
      - name: Build Electron installer
        run: |
          npm run build
          npx electron-builder --win nsis --publish never

      - name: Upload Electron installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} (Get-ChildItem dist-electron/*.exe).FullName --clobber
