name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # electron-builder 用 v${package.json version} 算 release tag 去掛同一個 release；
      # 兩邊 version 沒對齊的話它會另開一個新 release，Electron 安裝檔跟 latest.yml 就會跟 Tauri 版分家
      - name: Verify tag matches package.json / tauri.conf.json version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkgVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkgVersion -or $tag -ne $tauriVersion) {
            Write-Error "Version mismatch: tag=$tag package.json=$pkgVersion tauri.conf.json=$tauriVersion"
            exit 1
          }
          Write-Host "Version check passed: $tag"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Termo ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

      # Electron 版安裝檔：與 Tauri 版附在同一個 release
      # --publish always 會連 latest.yml（electron-updater 自動更新用的 metadata）一起上傳到同一個 tag 的 release
      - name: Build and publish Electron installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --win nsis --publish always
